# rabbitpeek configuration
# Copy this file to ~/.config/rabbitpeek/config.toml

[profiles.local]
host = "localhost"
port = 15672
username = "guest"
password = "guest"
vhost = "/"
tls = false

[profiles.production]
host = "rabbit.internal.company.com"
port = 15671
username = "admin"
password = "secret"
vhost = "/app"
tls = true
tls_cert = "/path/to/client.crt"
tls_key  = "/path/to/client.key"
tls_ca   = "/path/to/ca.crt"

default_profile = "local"
