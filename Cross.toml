[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install -y libssl-dev:arm64 zlib1g-dev:arm64 pkg-config",
    "ln -sf /usr/lib/aarch64-linux-gnu/libz.so /usr/aarch64-linux-gnu/lib/libz.so || true",
    "ln -sf /usr/lib/aarch64-linux-gnu/libz.a /usr/aarch64-linux-gnu/lib/libz.a || true",
    "ln -sf /usr/include/aarch64-linux-gnu/zconf.h /usr/aarch64-linux-gnu/include/zconf.h || true",
    "cp /usr/include/zlib.h /usr/aarch64-linux-gnu/include/zlib.h || true"
]
